{% extends "base.html" %}
{% block title %}OTP Verification{% endblock %}

{% block content %}
<div style="max-width:400px;margin:0 auto;text-align:center">
  <div style="width:72px;height:72px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);
              border-radius:50%;display:flex;align-items:center;justify-content:center;
              margin:0 auto 1.25rem;font-size:1.8rem;color:var(--accent3)">
    <i class="fas fa-mobile-screen-button"></i>
  </div>
  <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:.4rem">Two-Factor Verification</h1>
  <p style="color:var(--text-muted);font-size:.88rem;margin-bottom:2rem">
    A 6-digit OTP has been sent to your email.<br>
    <em style="font-size:.78rem">In dev mode, check your terminal.</em>
  </p>

  <div class="glass-card">
    <form method="POST" novalidate>
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}"/>
      <label class="cg-label">Enter OTP</label>
      <input class="cg-input" type="text" name="otp"
             placeholder="_ _ _ _ _ _"
             maxlength="6" required autocomplete="one-time-code"
             style="text-align:center;font-family:var(--mono);font-size:1.6rem;
                    letter-spacing:.35em;padding:.8rem;margin-bottom:1rem"/>
      <button type="submit" class="btn-cg btn-primary-cg"
              style="width:100%;justify-content:center;padding:.75rem">
        <i class="fas fa-shield-check"></i> Verify & Login
      </button>
    </form>
  </div>

  <div style="margin-top:1rem;font-size:.78rem;color:var(--text-muted)">
    <i class="fas fa-clock"></i> OTP expires in 10 minutes. &nbsp;
    <a href="{{ url_for('login') }}">Back to login</a>
  </div>
</div>
{% endblock %}
