{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div style="max-width:420px;margin:0 auto">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="width:56px;height:56px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
                border-radius:14px;display:flex;align-items:center;justify-content:center;
                margin:0 auto .75rem;font-size:1.4rem;color:var(--green)">
      <i class="fas fa-lock-open"></i>
    </div>
    <h1 style="font-size:1.5rem;font-weight:800">Set New Password</h1>
    <p style="color:var(--text-muted);font-size:.88rem;margin-top:.3rem">
      Choose a strong password for your account.
    </p>
  </div>

  <div class="glass-card">
    <form method="POST" novalidate>
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}"/>
      <div style="margin-bottom:1rem">
        <label class="cg-label">New Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock"></i>
          <input class="cg-input" type="password" name="password"
                 placeholder="••••••••" required oninput="liveStrength(this.value)"/>
        </div>
        <div id="sbar-wrap" style="display:none;margin-top:.4rem">
          <div style="height:4px;background:rgba(255,255,255,.07);border-radius:99px">
            <div id="sbar" style="height:4px;border-radius:99px;transition:all .3s;width:0"></div>
          </div>
          <span id="slabel" style="font-size:.73rem;font-weight:700"></span>
        </div>
      </div>
      <div style="margin-bottom:1.25rem">
        <label class="cg-label">Confirm Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock"></i>
          <input class="cg-input" type="password" name="confirm"
                 placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn-cg btn-primary-cg"
              style="width:100%;justify-content:center;padding:.75rem">
        <i class="fas fa-key"></i> Reset Password
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const colors={danger:'#ef4444',warning:'#f59e0b',success:'#10b981'};
const widths={danger:'33%',warning:'66%',success:'100%'};
const labels={danger:'Weak',warning:'Medium',success:'Strong'};
async function liveStrength(pw){
  const wrap=document.getElementById('sbar-wrap');
  if(!pw){wrap.style.display='none';return;}
  wrap.style.display='block';
  const res=await fetch('/api/password-strength',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const d=await res.json();
  document.getElementById('sbar').style.width=widths[d.css];
  document.getElementById('sbar').style.background=colors[d.css];
  document.getElementById('slabel').textContent=labels[d.css];
  document.getElementById('slabel').style.color=colors[d.css];
}
</script>
{% endblock %}
